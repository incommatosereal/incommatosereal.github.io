<div class="hero-banner">
  <div class="hero-banner__overlay"></div>

  <div class="hero-banner__content">
    <!-- AVATAR -->
    <div class="hero-banner__avatar-wrapper">
      <img
        src="{{ site.author.avatar | relative_url }}"
        alt="{{ site.author.name }}"
        class="hero-banner__avatar"
      >
    </div>

    <div class="hero-banner__terminal">
      <span id="hero-typed"></span><span class="hero-banner__cursor">█</span>
    </div>

    <p class="hero-banner__bio" id="hero-bio"></p>

    <div class="hero-banner__links">
      {% for link in site.author.links %}
        {% if link.url and link.url != "" %}
          <a href="{{ link.url }}" title="{{ link.label }}" target="_blank" rel="noopener noreferrer" class="hero-banner__link">
            <i class="{{ link.icon }}" aria-hidden="true"></i>
          </a>
        {% endif %}
      {% endfor %}
    </div>
  </div>
</div>

<style>
  .hero-banner {
    position: relative;
    width: 100% !important;
    height: 420px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;

    /* ── CAMBIA ESTA LÍNEA por tu GIF ── */
    background-image: url('/assets/images/blue_screen.gif');
    background-size: cover;
    background-position: center;
    background-color: #050d1a; /* fallback si no hay gif */
  }

  /* Overlay oscuro para que el contenido destaque sobre el gif */
  .hero-banner__overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(4, 9, 15, 0.55) 0%,
      rgba(4, 9, 15, 0.72) 100%
    );
    pointer-events: none;
  }

  .hero-banner__content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    text-align: center;
    padding: 0 20px;
  }

  /* AVATAR */
  .hero-banner__avatar-wrapper {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, #1a3ac0, #050d1a);
    box-shadow: 0 0 24px rgba(10, 40, 160, 0.6);
  }

  .hero-banner__avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    filter: brightness(0.92) contrast(1.05);
  }

  /* TERMINAL */
  .hero-banner__terminal {
    font-family: 'Fragment Mono', 'Share Tech Mono', monospace;
    font-size: 1rem;
    color: #c8d8e8;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .hero-banner__prompt {
    color: #4a7fc1;
    user-select: none;
  }

  #hero-typed {
    color: #e8f4ff;
  }

  .hero-banner__cursor {
    color: #5b9bd5;
    animation: blink-cursor 1s step-end infinite;
    line-height: 1;
  }

  @keyframes blink-cursor {
    50% { opacity: 0; }
  }

  /* BIO */
  .hero-banner__bio {
    font-family: 'Fragment Mono', 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    color: #6a8aaa;
    letter-spacing: 0.08em;
    max-width: 480px;
    line-height: 1.6;
    margin: 0;
    min-height: 1.2em;
  }

  /* LINKS SOCIALES */
  .hero-banner__links {
    display: flex;
    gap: 18px;
    margin-top: 4px;
  }

  .hero-banner__link {
    color: #4a6a8a;
    font-size: 1.3rem;
    transition: color 0.2s, text-shadow 0.2s;
    text-decoration: none;
  }

  .hero-banner__link:hover {
    color: #5b9bd5;
    text-shadow: 0 0 10px rgba(91, 155, 213, 0.5);
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .hero-banner { height: 380px; }
    .hero-banner__terminal { font-size: 0.95rem; }
    .hero-banner__avatar-wrapper { width: 88px; height: 88px; }
  }

  .hero-banner__terminal {
  text-shadow: 0 0 20px rgba(0,0,0,0.9), 0 2px 8px rgba(0,0,0,1);
  border-radius: 2px;
}

.hero-banner__bio {
  text-shadow: 0 1px 6px rgba(0,0,0,1);
  border-radius: 2px;
}

.hero-banner__overlay {
  background: linear-gradient(
    to bottom,
    rgba(4, 9, 15, 0.70) 0%,
    rgba(4, 9, 15, 0.85) 100%
  );
}

.hero-banner {
  width: 100vw;
  position: relative;
  left: 50%;
  right: 50%;
  margin-left: -50vw;
  margin-right: -50vw;
}
</style>

<script>
(function () {
  var lines = [
    "incommatose@vps-ds64534wv:~$ whoami",
    "incommatose",
    "incommatose@vps-ds64534wv:~$ cat role.txt",
    "Cybersecurity Enthusiast | eJPTv2 | CTF Player | Computer Engineer"
  ];

  var typedEl = document.getElementById('hero-typed');
  var current = 0;

  function typeLine(text, speed, cb) {
    var i = 0;
    typedEl.textContent = '';
    var iv = setInterval(function() {
      typedEl.textContent += text[i++];
      if (i >= text.length) {
        clearInterval(iv);
        if (cb) setTimeout(cb, 600);
      }
    }, speed);
  }

  function eraseLine(cb) {
    var iv = setInterval(function() {
      var t = typedEl.textContent;
      if (t.length === 0) {
        clearInterval(iv);
        if (cb) cb();
      } else {
        typedEl.textContent = t.slice(0, -1);
      }
    }, 25);
  }

  function run() {
    typeLine(lines[current], 55, function() {
      setTimeout(function() {
        eraseLine(function() {
          current = (current + 1) % lines.length;
          setTimeout(run, 200);
        });
      }, 800);
    });
  }

  run();
})();
</script>
