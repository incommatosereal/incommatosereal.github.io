<div class="hero-banner">
  <div class="hero-banner__overlay"></div>

  <div class="hero-banner__content">
    <!-- AVATAR -->
    <div class="hero-banner__avatar-wrapper">
      <img
        src="{{ site.author.avatar | relative_url }}"
        alt="{{ site.author.name }}"
        class="hero-banner__avatar"
      >
    </div>

    <div class="hero-banner__terminal">
      <span id="hero-typed"></span><span class="hero-banner__cursor">█</span>
    </div>

    <p class="hero-banner__bio" id="hero-bio"></p>

    <div class="hero-banner__links">
      {% for link in site.author.links %}
        {% if link.url and link.url != "" %}
          <a href="{{ link.url }}" title="{{ link.label }}" target="_blank" rel="noopener noreferrer" class="hero-banner__link">
            <i class="{{ link.icon }}" aria-hidden="true"></i>
          </a>
        {% endif %}
      {% endfor %}
    </div>
  </div>
</div>

<script>
(function () {
  var lines = [
    "incommatose@vps-ds64534wv:~$ whoami",
    "incommatose",
    "incommatose@vps-ds64534wv:~$ cat role.txt",
    "Cybersecurity Enthusiast | eJPTv2 | CTF Player | Computer Engineer"
  ];

  var typedEl = document.getElementById('hero-typed');
  var current = 0;

  function typeLine(text, speed, cb) {
    var i = 0;
    typedEl.textContent = '';
    var iv = setInterval(function() {
      typedEl.textContent += text[i++];
      if (i >= text.length) {
        clearInterval(iv);
        if (cb) setTimeout(cb, 600);
      }
    }, speed);
  }

  function eraseLine(cb) {
    var iv = setInterval(function() {
      var t = typedEl.textContent;
      if (t.length === 0) {
        clearInterval(iv);
        if (cb) cb();
      } else {
        typedEl.textContent = t.slice(0, -1);
      }
    }, 25);
  }

  function run() {
    typeLine(lines[current], 55, function() {
      setTimeout(function() {
        eraseLine(function() {
          current = (current + 1) % lines.length;
          setTimeout(run, 200);
        });
      }, 800);
    });
  }

  run();
})();
</script>
